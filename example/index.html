<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Server Example</title>
    <style>
    .app { max-width: 1024px; margin: 0 auto; padding-bottom: 48px; }
    .container * { margin: 0; padding: 0; box-sizing: border-box;}
    .container { margin: 10px 20px; padding: 10px 0; border-bottom: solid 1px #ccc; color: #333; }
    .container p { line-height: 1.7; display: flex; align-items: center; justify-content: flex-start; gap: 20px; }
    .container .url { flex: 1; font-weight: bold; }
    .container .method { display: inline-block; background-color: #0099CC; color: #fff; padding: 4px 6px; border-radius: 4px; line-height: 1; }
    .container .status { display: inline-block; background-color: #e1e1e1; color: #666; padding: 4px 6px; border-radius: 4px; line-height: 1; }
    .container pre { padding:12px; margin: 16px auto; background-color: #f1f2f3; border-radius: 8px; width: 100%; max-height: 400px; overflow: auto; }
    .container pre, .container code {font-size: 1.1em; line-height: 1.6;}
  </style>
  </head>
  <body>
    <div class="app">
      <h1>Mock Example</h1>
      <section style="border:solid 1px #ccc; padding: 10px 20px; margin-bottom: 20px;">
        <h4>mock upload file:</h4>
        <form action="/api/upload" method="post" enctype="multipart/form-data">
          <p>
            <span>file: </span>
            <input type="file" name="files" multiple>
          </p>
          <p>
            <span>name:</span>
            <input type="text" name="name" value="mark">
          </p>
          <p>
            <input type="submit" value="submit">
          </p>
        </form>
      </section>
      <a href="/api/download" download="shared.ts">Mock Download File</a>
      <br>
      <h3>Please open the browser Devtools and switch to the network tab to view the interface information.</h3>
      <h3>请打开浏览器 开发者工具 并切换到 network 查看接口信息</h3>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
