<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite Mock Dev Server</title>
    <script>
      (function () {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        try{
          const { appearance } = JSON.parse(localStorage.getItem('vite-mock-dev-server:store') || '{}')
          if (appearance === 'dark' || (prefersDark && appearance !== 'light'))
            document.documentElement.classList.toggle('dark', true)
        } catch{}
      })()

      ;(function () {
        if (!location.pathname.endsWith('/'))
          location.pathname += '/'
      })()
    </script>
  </head>
  <body class="font-sans bg-background transition-colors">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
